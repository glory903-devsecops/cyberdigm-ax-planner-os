version: "2"
type: frontend
tech_stack:
  - TypeScript
  - Next.js
  - Tailwind CSS
  - Framer Motion
  - Supabase
routes:
  - path: /cmtx-ax-planner-os/
    file: src/app/(dashboard)/page.tsx
    auth_required: false
    description: Dashboard overview page
  - path: /cmtx-ax-planner-os/intelligence/
    file: src/app/(dashboard)/intelligence/page.tsx
    auth_required: false
    description: Industry Intelligence with competitor radar
  - path: /cmtx-ax-planner-os/gr-hub/
    file: src/app/(dashboard)/gr-hub/page.tsx
    auth_required: false
    description: GR Hub for government grants
features:
  - name: Competitor Intelligence
    description: Real-time competitor tracking and comparison
    files:
      - src/app/(dashboard)/intelligence/page.tsx
      - src/components/features/IntelligenceComponents.tsx
      - src/lib/data-service.ts
    entry_route: /cmtx-ax-planner-os/intelligence/
    user_interactions:
      - View competitor radar chart
      - Compare competitors in the comparison matrix
      - See real-time signal updates
    api_calls:
      - method: GET
        endpoint: /rest/v1/competitors
      - method: GET
        endpoint: /rest/v1/competitor_signals
    auth_required: false
known_limitations: []
